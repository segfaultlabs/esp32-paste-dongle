; PlatformIO Project Configuration File
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = esp32-ble

[common]
framework = arduino
lib_deps =
    me-no-dev/ESPAsyncWebServer @ ^1.2.3
    me-no-dev/AsyncTCP @ ^1.1.1
monitor_speed = 115200
board_build.partitions = min_spiffs.csv
build_flags =
    -D CORE_DEBUG_LEVEL=3

; ------------------------------------------------------------------
; Classic ESP32: BLE HID keyboard + WiFi AP + web UI
; ------------------------------------------------------------------
[env:esp32-ble]
platform = espressif32
board = esp32dev
framework = ${common.framework}
board_build.partitions = ${common.board_build.partitions}
lib_deps =
    ${common.lib_deps}
    ESP32 BLE Keyboard
build_flags =
    ${common.build_flags}
    -D HID_BACKEND_BLE=1
monitor_speed = ${common.monitor_speed}

; ------------------------------------------------------------------
; Classic ESP32: BLE HID with a custom device name (e.g. Logitech K380)
; ------------------------------------------------------------------
[env:esp32-ble-logitech]
extends = env:esp32-ble
build_flags =
    ${env:esp32-ble.build_flags}
    -D DEVICE_NAME='"Logitech K380"'

; ------------------------------------------------------------------
; ESP32-S3: USB HID keyboard + WiFi AP + web UI
; ------------------------------------------------------------------
[env:esp32s3-usb]
platform = espressif32
board = esp32-s3-devkitm-1
framework = ${common.framework}
board_upload.flash_size = 4MB
board_upload.maximum_size = 4194304
board_build.partitions = ${common.board_build.partitions}
lib_deps =
    ${common.lib_deps}
build_flags =
    ${common.build_flags}
    -D HID_BACKEND_USB=1
    -D ARDUINO_USB_MODE=0
    -D ARDUINO_USB_CDC_ON_BOOT=1
monitor_speed = ${common.monitor_speed}
; Use the ESP32-S3 USB Serial/JTAG download-mode entry instead of the classic
; 1200-baud reset, which can leave the ROM bootloader persistently enabled.
upload_flags = --before=usb_reset

; ------------------------------------------------------------------
; ESP32-S3: BLE HID keyboard + WiFi AP + web UI
; ------------------------------------------------------------------
[env:esp32s3-ble]
platform = espressif32
board = esp32-s3-devkitm-1
framework = ${common.framework}
board_upload.flash_size = 4MB
board_upload.maximum_size = 4194304
board_build.partitions = ${common.board_build.partitions}
lib_deps =
    ${common.lib_deps}
    ESP32 BLE Keyboard
build_flags =
    ${common.build_flags}
    -D HID_BACKEND_BLE=1
monitor_speed = ${common.monitor_speed}

; ------------------------------------------------------------------
; ESP32-C3: BLE HID keyboard + WiFi AP + web UI
; (No USB-OTG; BLE is the only HID path.)
; ------------------------------------------------------------------
[env:esp32c3-ble]
platform = espressif32
board = esp32-c3-devkitm-1
framework = ${common.framework}
board_build.partitions = ${common.board_build.partitions}
lib_deps =
    ${common.lib_deps}
    ESP32 BLE Keyboard
build_flags =
    ${common.build_flags}
    -D HID_BACKEND_BLE=1
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
monitor_speed = ${common.monitor_speed}
